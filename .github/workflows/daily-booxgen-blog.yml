name: Daily BooxGen SEO Blog

on:
  schedule:
    # 11:00 PM Asia/Kolkata = 5:30 PM UTC.
    - cron: "30 17 * * *"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      WP_URL: ${{ secrets.WP_URL }}
      WP_USERNAME: ${{ secrets.WP_USERNAME }}
      WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5-mini' }}
      DRY_RUN: ${{ vars.DRY_RUN || 'false' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check required secrets
        run: python scripts/check_secrets.py

      - name: Validate WordPress and OpenAI access
        run: python scripts/preflight.py

      - name: Publish daily SEO blog
        run: python scripts/publish_daily_blog.py
